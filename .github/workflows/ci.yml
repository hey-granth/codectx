name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Installing required tools for the CI steps
          pip install ruff mypy vulture pytest build
          # Install the project itself in editable mode so tools can find it if needed
          pip install -e .

      - name: Run linting
        run: ruff check src

      - name: Run type checking
        run: mypy src

      - name: Run dead code detection
        run: vulture src --min-confidence 80

      - name: Run test suite
        run: pytest -v

      - name: Build package
        run: python -m build
